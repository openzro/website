<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="oz-bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="oz-bg-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Mask: white = visible disc, black = transparent cutout for the
         Z sails. Used in dark mode so the page background shows through
         the Z instead of stamping a white shape on top of the disc. -->
    <mask id="oz-z-cutout">
      <rect width="64" height="64" fill="#ffffff"/>
      <path fill="#000000" d="m 42.69949,50.729586 c -5.246771,-1.783072 -10.782457,-1.832655 -16.63185,0 -0.668227,0.02122 -0.999265,-0.317022 -0.478323,-0.97503 L 47.71668,18.700815 c 0,0 0.157573,-0.196687 0.354413,-0.298049 0.147255,-0.07583 0.295663,-0.0759 0.450161,0.0028 0.163897,0.08346 0.281363,0.233899 0.343513,0.325372 5.118536,7.533388 8.852414,20.216321 -4.595268,31.484113 -0.587268,0.492072 -0.882773,0.514556 -1.57001,0.514557 z"/>
      <g transform="rotate(180 32 32)">
        <path fill="#000000" d="m 42.69949,50.729586 c -5.246771,-1.783072 -10.782457,-1.832655 -16.63185,0 -0.668227,0.02122 -0.999265,-0.317022 -0.478323,-0.97503 L 47.71668,18.700815 c 0,0 0.157573,-0.196687 0.354413,-0.298049 0.147255,-0.07583 0.295663,-0.0759 0.450161,0.0028 0.163897,0.08346 0.281363,0.233899 0.343513,0.325372 5.118536,7.533388 8.852414,20.216321 -4.595268,31.484113 -0.587268,0.492072 -0.882773,0.514556 -1.57001,0.514557 z"/>
      </g>
    </mask>

    <style>
      .oz-light { display: inline; }
      .oz-dark  { display: none; }
      @media (prefers-color-scheme: dark) {
        .oz-light { display: none; }
        .oz-dark  { display: inline; }
      }
    </style>
  </defs>

  <!-- Light mode: gradient disc + opaque white Z sails. -->
  <g class="oz-light">
    <circle cx="32" cy="32" r="28" fill="url(#oz-bg-light)"/>
    <path fill="#f9f9f9" d="m 42.69949,50.729586 c -5.246771,-1.783072 -10.782457,-1.832655 -16.63185,0 -0.668227,0.02122 -0.999265,-0.317022 -0.478323,-0.97503 L 47.71668,18.700815 c 0,0 0.157573,-0.196687 0.354413,-0.298049 0.147255,-0.07583 0.295663,-0.0759 0.450161,0.0028 0.163897,0.08346 0.281363,0.233899 0.343513,0.325372 5.118536,7.533388 8.852414,20.216321 -4.595268,31.484113 -0.587268,0.492072 -0.882773,0.514556 -1.57001,0.514557 z"/>
    <g transform="rotate(180 32 32)">
      <path fill="#f9f9f9" d="m 42.69949,50.729586 c -5.246771,-1.783072 -10.782457,-1.832655 -16.63185,0 -0.668227,0.02122 -0.999265,-0.317022 -0.478323,-0.97503 L 47.71668,18.700815 c 0,0 0.157573,-0.196687 0.354413,-0.298049 0.147255,-0.07583 0.295663,-0.0759 0.450161,0.0028 0.163897,0.08346 0.281363,0.233899 0.343513,0.325372 5.118536,7.533388 8.852414,20.216321 -4.595268,31.484113 -0.587268,0.492072 -0.882773,0.514556 -1.57001,0.514557 z"/>
    </g>
  </g>

  <!-- Dark mode: lighter gradient disc with the Z masked out so the
       page background shows through. -->
  <g class="oz-dark">
    <circle cx="32" cy="32" r="28" fill="url(#oz-bg-dark)" mask="url(#oz-z-cutout)"/>
  </g>
</svg>
